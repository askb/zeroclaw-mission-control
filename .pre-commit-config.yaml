---
ci:
  autofix_commit_msg: "chore: pre-commit autofixes"
  autoupdate_commit_msg: "chore: pre-commit autoupdate"

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: detect-private-key
      - id: no-commit-to-branch
        args: [--branch, main]
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.37.1
    hooks:
      - id: yamllint
        args: [-c, .yamllint]

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        args: [-S, warning]

  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.34.0
    hooks:
      - id: check-github-workflows

  - repo: https://github.com/codespell-project/codespell
    rev: v2.3.0
    hooks:
      - id: codespell
        args: [--ignore-words, .codespell]
        exclude: ^LICENSES/

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]
        exclude: \.env\.example$

  # Block gateway runtime files from ever being committed
  - repo: local
    hooks:
      - id: no-gateway-runtime
        name: Block gateway runtime files
        entry: >-
          bash -c 'echo "ERROR: Gateway runtime files must not be committed.
          These files contain secrets and are gitignored.
          Use: git reset HEAD <file>" && exit 1'
        language: system
        files: >-
          config/gateway/(openclaw\.json|secrets\.json|
          exec-approvals\.json|update-check\.json)$|
          config/gateway/(devices|canvas|identity|logs|memory)/
