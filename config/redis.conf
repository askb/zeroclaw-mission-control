# ZeroClaw Redis — Security Configuration
# Mounted read-only into the Redis container

# ── Network ──────────────────────────────────────────────────────
bind 0.0.0.0
port 6379
protected-mode yes
tcp-backlog 128
timeout 300
tcp-keepalive 60

# ── Security ─────────────────────────────────────────────────────
# Password set via --requirepass flag in docker-compose.yml
# Disable dangerous commands
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command DEBUG ""
rename-command CONFIG "ZEROCLAW_CONFIG"
rename-command SHUTDOWN "ZEROCLAW_SHUTDOWN"

# ── Memory ───────────────────────────────────────────────────────
maxmemory 200mb
maxmemory-policy allkeys-lru

# ── Persistence ──────────────────────────────────────────────────
# RDB snapshots for session data
save 900 1
save 300 10
save 60 10000
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# ── Logging ──────────────────────────────────────────────────────
loglevel notice
logfile ""

# ── Clients ──────────────────────────────────────────────────────
maxclients 100

# ── Slow Log ─────────────────────────────────────────────────────
slowlog-log-slower-than 10000
slowlog-max-len 128
