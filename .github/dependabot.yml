---
version: 2

updates:
  # Docker base images
  - package-ecosystem: docker-compose
    directory: /docker
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Los_Angeles
    commit-message:
      prefix: "chore(deps)"
    labels:
      - dependencies
      - docker
    open-pull-requests-limit: 5

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Los_Angeles
    commit-message:
      prefix: "ci(deps)"
    labels:
      - dependencies
      - ci
    open-pull-requests-limit: 10
