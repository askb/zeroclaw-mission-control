---
name: Daily Health Report
on:
  schedule:
    - cron: "0 5 * * 1-5"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  health:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Generate health report
        id: report
        run: |
          REPORT_FILE="${GITHUB_WORKSPACE}/health-report.md"
          {
            echo "## 🏥 ZeroClaw Mission Control — Daily Health Report"
            echo ""
            echo "**Date:** $(date -u '+%Y-%m-%d %H:%M UTC')"
            echo ""

            echo "### 📊 Repository Stats"
            echo "| Metric | Count |"
            echo "|--------|-------|"
            echo "| Docker services | $(grep -c 'container_name:' docker/docker-compose.yml 2>/dev/null || echo 0) |"
            echo "| Agent definitions | $(find agents/ -name 'agent.md' 2>/dev/null | wc -l) |"
            echo "| Skills | $(find config/gateway/workspace/skills/ -name 'SKILL.md' 2>/dev/null | wc -l) |"
            echo "| GHA Workflows | $(find .github/workflows/ -name '*.y*ml' 2>/dev/null | wc -l) |"
            echo "| Shell scripts | $(find scripts/ -name '*.sh' 2>/dev/null | wc -l) |"
            echo ""

            echo "### 🔒 Security Checks"
            # Check for potential secrets
            SECRETS=$(grep -rn --include='*.yaml' --include='*.yml' --include='*.json' --include='*.sh' -iE '(password|token|secret|api.key)\s*[:=]\s*[^${\s]' . 2>/dev/null | grep -v node_modules | grep -v '.git/' | grep -v 'example' | grep -v 'placeholder' | grep -v 'SET_A_SECURE' | wc -l)
            if [ "$SECRETS" -gt 0 ]; then
              echo "⚠️ Found $SECRETS potential hardcoded secrets"
            else
              echo "✅ No hardcoded secrets detected"
            fi
            echo ""

            # Check SHA pinning
            UNPINNED=$(grep -rn 'uses:' .github/workflows/*.y*ml 2>/dev/null | grep -v '#' | grep -vE '@[0-9a-f]{40}' | grep -v 'uses: ./' | wc -l)
            if [ "$UNPINNED" -gt 0 ]; then
              echo "⚠️ Found $UNPINNED unpinned GitHub Actions"
            else
              echo "✅ All GitHub Actions SHA-pinned"
            fi
            echo ""

            echo "### 📋 Configuration Inventory"
            echo "#### Docker Services"
            grep 'container_name:' docker/docker-compose.yml 2>/dev/null | sed 's/.*: /- /' || echo "- none"
            echo ""

            echo "#### Agent Personas"
            for d in agents/*/; do
              name=$(basename "$d")
              echo "- $name"
            done
            echo ""

            echo "#### Skills"
            for d in config/gateway/workspace/skills/*/; do
              name=$(basename "$d")
              echo "- $name"
            done
            echo ""

            echo "---"
            echo "*Generated by [Daily Health Report](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})*"
          } > "$REPORT_FILE"

          cat "$REPORT_FILE"
          {
            echo "report<<EOF"
            cat "$REPORT_FILE"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Close old health reports
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue list --repo "${{ github.repository }}" --label "health-report" --state open --json number --jq '.[].number' | while read -r num; do
            gh issue close "$num" --repo "${{ github.repository }}" --comment "Superseded by newer health report."
          done

      - name: Create health report issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "🏥 Health Report — $(date -u '+%Y-%m-%d')" \
            --body-file "${GITHUB_WORKSPACE}/health-report.md" \
            --label "health-report"
