---
name: PR Review Agent
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changes
        run: |
          FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.sha }} | head -50)
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$FILES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Validate Docker Compose
        if: contains(steps.changes.outputs.files, 'docker/')
        run: |
          echo "### 🐳 Docker Compose Validation" >> "$GITHUB_STEP_SUMMARY"
          if docker compose -f docker/docker-compose.yml config --quiet 2>/dev/null; then
            echo "✅ docker-compose.yml is valid" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "❌ docker-compose.yml has errors" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Validate YAML files
        run: |
          pip install yamllint
          echo "### 📋 YAML Validation" >> "$GITHUB_STEP_SUMMARY"
          yamllint -c .yamllint . >> "$GITHUB_STEP_SUMMARY" 2>&1 || true

      - name: Check for secrets in diff
        run: |
          echo "### 🔒 Secret Scan" >> "$GITHUB_STEP_SUMMARY"
          if git diff ${{ github.event.pull_request.base.sha }} ${{ github.sha }} | grep -iE '(api_key|token|secret|password)\s*[:=]' | grep -v '#' | grep -v 'example' | grep -v 'placeholder'; then
            echo "⚠️ Potential secrets detected in diff" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "✅ No secrets detected" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Summary
        run: |
          echo "### 📁 Changed Files" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.changes.outputs.files }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
