---
name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"

categories:
  - title: "🚀 Features"
    labels:
      - feature
      - enhancement
  - title: "🐛 Bug Fixes"
    labels:
      - fix
      - bugfix
      - bug
  - title: "🔒 Security"
    labels:
      - security
  - title: "🧰 Maintenance"
    labels:
      - chore
      - dependencies
  - title: "📖 Documentation"
    labels:
      - documentation
      - docs
  - title: "🤖 Agents"
    labels:
      - agent
      - persona
  - title: "🏗️ Infrastructure"
    labels:
      - docker
      - ci
      - infrastructure

change-template: "- $TITLE @$AUTHOR (#$NUMBER)"

version-resolver:
  major:
    labels:
      - major
      - breaking
  minor:
    labels:
      - minor
      - feature
      - enhancement
  patch:
    labels:
      - patch
      - fix
      - bugfix
  default: patch

template: |
  ## Changes

  $CHANGES

  ## Contributors
  $CONTRIBUTORS
