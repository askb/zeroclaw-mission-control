---
# ZeroClaw Mission Control — Hardened Docker Compose
# Run: docker compose up -d
# Docs: ../README.md

services:
  gateway:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: zeroclaw-gateway
    volumes:
      - ../config/zeroclaw.json5:/home/node/.openclaw/openclaw.json5:ro
      - ../agents:/home/node/.openclaw/agents:ro
      - ../workspace:/home/node/workspace
    ports:
      - "${GATEWAY_BIND_HOST:-127.0.0.1}:${GATEWAY_PORT:-18789}:18789"
    env_file: .env
    environment:
      - ZEROCLAW_GATEWAY_TOKEN=${ZEROCLAW_GATEWAY_TOKEN}
    restart: unless-stopped
    networks:
      - zeroclaw-net
    # ── Security Hardening ──
    user: "1000:1000"
    read_only: true
    tmpfs:
      - /tmp:size=100M,noexec,nosuid
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q --spider http://localhost:18789/health || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  mission-control:
    image: ghcr.io/crshdn/mission-control:latest
    container_name: mission-control
    ports:
      - "${DASHBOARD_BIND_HOST:-127.0.0.1}:${DASHBOARD_PORT:-4000}:4000"
    environment:
      - OPENCLAW_GATEWAY_URL=ws://gateway:18789
      - OPENCLAW_GATEWAY_TOKEN=${ZEROCLAW_GATEWAY_TOKEN}
    depends_on:
      gateway:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - zeroclaw-net
    # ── Security Hardening ──
    user: "1000:1000"
    read_only: true
    tmpfs:
      - /tmp:size=50M,noexec,nosuid
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q --spider http://localhost:4000/health || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: zeroclaw-redis
    command:
      - redis-server
      - /usr/local/etc/redis/redis.conf
      - --requirepass
      - ${REDIS_PASSWORD}
    volumes:
      - ../config/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis-data:/data
    # No host port — internal only (zero-trust)
    expose:
      - "6379"
    restart: unless-stopped
    networks:
      - zeroclaw-net
    # ── Security Hardening ──
    user: "999:999"
    read_only: true
    tmpfs:
      - /tmp:size=10M,noexec,nosuid
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

volumes:
  redis-data:
    driver: local

networks:
  zeroclaw-net:
    driver: bridge
    internal: false
