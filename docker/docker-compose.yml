---
# ZeroClaw Mission Control — Hardened Docker Compose
# Run: docker compose up -d
# Docs: ../README.md

services:
  gateway:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: zeroclaw-gateway
    volumes:
      - ../config/gateway:/home/node/.openclaw
      - ../agents:/home/node/.openclaw/agents
      - ../workspace:/home/node/workspace
      - ../data/usage:/data/usage
    ports:
      - "${GATEWAY_BIND_HOST:-127.0.0.1}:${GATEWAY_PORT:-18789}:18789"
    env_file: .env
    environment:
      - ZEROCLAW_GATEWAY_TOKEN=${ZEROCLAW_GATEWAY_TOKEN}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - SEARXNG_URL=http://zeroclaw-searxng:8080
      - HA_URL=${HA_URL}
      - HA_TOKEN=${HA_TOKEN}
      - NODE_OPTIONS=--max-old-space-size=3072
    restart: unless-stopped
    networks:
      - zeroclaw-net
    # ── Security Hardening ──
    # Gateway needs write access to config dir for runtime state
    # Image runs as 'node' user — don't override
    # agents/ is read-only — definitions should not change at runtime
    tmpfs:
      - /tmp:size=100M,noexec,nosuid
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
        reservations:
          cpus: "0.5"
          memory: 1G
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q --spider http://localhost:18789/health || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # REMOVED: Using zeroclaw-dashboard instead (askb/zeroclaw-dashboard)
  # mission-control:
  #   image: ghcr.io/crshdn/mission-control:latest
  #   container_name: mission-control
  #   ports:
  #     - "${DASHBOARD_BIND_HOST:-127.0.0.1}:${DASHBOARD_PORT:-4000}:4000"
  #   environment:
  #     - OPENCLAW_GATEWAY_URL=ws://gateway:18789
  #     - OPENCLAW_GATEWAY_TOKEN=${ZEROCLAW_GATEWAY_TOKEN}
  #   depends_on:
  #     gateway:
  #       condition: service_healthy
  #   restart: unless-stopped
  #   networks:
  #     - zeroclaw-net
  #   volumes:
  #     - mc-data:/app/data
  #     - mc-identity:/home/node/.mission-control
  #   read_only: true
  #   tmpfs:
  #     - /tmp:size=50M,noexec,nosuid
  #   cap_drop:
  #     - ALL
  #   security_opt:
  #     - no-new-privileges:true
  #   deploy:
  #     resources:
  #       limits:
  #         cpus: "1.0"
  #         memory: 512M
  #       reservations:
  #         cpus: "0.25"
  #         memory: 128M
  #   healthcheck:
  #     test:
  #       [
  #         "CMD-SHELL",
  #         "node -e \"fetch('http://localhost:4000').then(r=>{process.exit(r.ok?0:1)}).catch(()=>process.exit(1))\"",
  #       ]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3
  #     start_period: 15s
  #   logging:
  #     driver: json-file
  #     options:
  #       max-size: "10m"
  #       max-file: "3"

  dashboard:
    build:
      context: ../../zeroclaw-dashboard
      dockerfile: Dockerfile
    container_name: zeroclaw-dashboard
    ports:
      - "${DASHBOARD_BIND_HOST:-127.0.0.1}:${DASHBOARD_PORT:-4000}:3000"
    environment:
      - GATEWAY_WS_URL=ws://gateway:18789
      - GATEWAY_TOKEN=${ZEROCLAW_GATEWAY_TOKEN}
      - GITHUB_RO_TOKEN=${GITHUB_RO_TOKEN}
      - GERRIT_HTTP_USER=${GERRIT_HTTP_USER}
      - GERRIT_HTTP_PASS=${GERRIT_HTTP_PASS}
    volumes:
      - ../.specify:/app/data/specify:ro
      - ../agents:/app/data/agents:ro
      - ../config/gateway/workspace:/app/data/workspace:ro
      - ../data/usage:/app/data/usage:ro
      - ../data/reviews:/app/data/reviews:ro
      - ../data/jobs:/app/data/jobs:ro
    depends_on:
      gateway:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - zeroclaw-net
    read_only: true
    tmpfs:
      - /tmp:size=50M,noexec,nosuid
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q --spider http://0.0.0.0:3000/ || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  searxng:
    image: searxng/searxng:latest
    container_name: zeroclaw-searxng
    # Internal only — no host port (gateway accesses via zeroclaw-net)
    expose:
      - "8080"
    volumes:
      - ../config/searxng:/etc/searxng:rw
    restart: unless-stopped
    networks:
      - zeroclaw-net
    # ── Security Hardening ──
    # NOTE: read_only removed — SearXNG 2026.4+ needs writable /etc/searxng
    # and /etc/ssl/certs at startup (granian server)
    tmpfs:
      - /tmp:size=50M,noexec,nosuid
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q --spider http://localhost:8080/ || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: zeroclaw-redis
    command:
      - redis-server
      - /usr/local/etc/redis/redis.conf
      - --requirepass
      - ${REDIS_PASSWORD}
    volumes:
      - ../config/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis-data:/data
    # No host port — internal only (zero-trust)
    expose:
      - "6379"
    restart: unless-stopped
    networks:
      - zeroclaw-net
    # ── Security Hardening ──
    user: "999:999"
    read_only: true
    tmpfs:
      - /tmp:size=10M,noexec,nosuid
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  caddy:
    image: caddy:2-alpine
    container_name: zeroclaw-caddy
    ports:
      - "8443:443"
      - "8444:444"
    volumes:
      - ../config/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped
    networks:
      - zeroclaw-net
    # ── Security Hardening ──
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          cpus: "0.1"
          memory: 32M
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q --spider --no-check-certificate https://localhost:443/ || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # ── PopeBot Job Runner (ephemeral, one-shot) ────────────────────
  # Usage: docker compose run --rm job-runner "Add dark mode toggle" askb/zeroclaw-dashboard
  job-runner:
    build:
      context: ..
      dockerfile: docker/Dockerfile.coder
    profiles:
      - jobs
    restart: "no"
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:noexec,size=512m
      - /workspace:size=2g
    volumes:
      - ../config/allowed-repos.json:/config/allowed-repos.json:ro
      - ../data/jobs:/output:rw
    environment:
      - GITHUB_PAT=${GITHUB_PAT}
      - GITHUB_USER=${GITHUB_USER:-askb}
      - TARGET_REPO=${TARGET_REPO:-askb/zeroclaw-mission-control}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - AIDER_MODEL=${AIDER_MODEL:-openrouter/moonshotai/kimi-k2}
      - JOB_TIMEOUT=1800
    networks:
      - zeroclaw-net
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  redis-data:
    driver: local
  caddy-data:
    driver: local
  caddy-config:
    driver: local

networks:
  zeroclaw-net:
    driver: bridge
    internal: false
